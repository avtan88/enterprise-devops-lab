apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-blue
  namespace: enterprise-devops
  labels:
    app: shipping
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shipping
      version: blue
  template:
    metadata:
      labels:
        app: shipping
        version: blue
    spec:
      containers:
        - name: shipping
          image: ghcr.io/avtan88/enterprise/shipping-service:66d79d42987b1e773c8ad7c63dbe6087f433d8a0
          ports:
            - containerPort: 8080
