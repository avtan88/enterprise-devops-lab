apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-green
  namespace: enterprise-devops
  labels:
    app: payments
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments
      version: green
  template:
    metadata:
      labels:
        app: payments
        version: green
    spec:
      containers:
        - name: payments
          image: ghcr.io/avtan88/enterprise/payments-service:66d79d42987b1e773c8ad7c63dbe6087f433d8a0
          ports:
            - containerPort: 8080
