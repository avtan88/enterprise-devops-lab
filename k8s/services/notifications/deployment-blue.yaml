apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-blue
  namespace: enterprise-devops
  labels:
    app: notifications
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notifications
      version: blue
  template:
    metadata:
      labels:
        app: notifications
        version: blue
    spec:
      containers:
        - name: notifications
          image: ghcr.io/avtan88/enterprise/notifications-service:66d79d42987b1e773c8ad7c63dbe6087f433d8a0
          ports:
            - containerPort: 8080
