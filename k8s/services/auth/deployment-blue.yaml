apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-blue
  namespace: enterprise-devops
  labels:
    app: auth
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
      version: blue
  template:
    metadata:
      labels:
        app: auth
        version: blue
    spec:
      containers:
        - name: auth
          image: ghcr.io/avtan88/enterprise/auth-service:27e473b53d93d94e7d4ef023db045751d12068c9
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
