name: users-service-ci

on:
  push:
    paths:
      - "services/users-service/**"
      - ".github/workflows/users-service-ci.yml"
      - "platform/ci-templates/v1/**"
  pull_request:
    paths:
      - "services/users-service/**"

permissions:
  contents: read
  packages: write
  security-events: write

jobs:

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate service contract
        run: |
          test -f services/users-service/Dockerfile
          test -f services/users-service/requirements.txt
          test -f services/users-service/ci/pipeline.yml
          test -d services/users-service/app
          test -d services/users-service/tests


  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/users-service
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        working-directory: services/users-service
        run: |
          python -m pytest


  build-and-scan:
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          echo "tag=ghcr.io/avtan88/enterprise/users-service:${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image
        working-directory: services/users-service
        run: |
          docker build -t ${{ steps.meta.outputs.tag }} .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.meta.outputs.tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL


  publish:
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker push ghcr.io/avtan88/enterprise/users-service:${GITHUB_SHA}
