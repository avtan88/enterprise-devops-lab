name: users-service-ci

on:
  push:
    paths:
      - "services/users-service/**"
      - ".github/workflows/users-service-ci.yml"
      - "platform/ci-templates/v1/**"
  pull_request:
    paths:
      - "services/users-service/**"
      - ".github/workflows/users-service-ci.yml"
      - "platform/ci-templates/v1/**"

permissions:
  contents: read
  packages: read

jobs:

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate service contract
        run: |
          test -f services/users-service/Dockerfile
          test -f services/users-service/requirements.txt
          test -f services/users-service/ci/pipeline.yml
          test -d services/users-service/app
          test -d services/users-service/tests


  test:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/users-service
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        working-directory: services/users-service
        run: |
          python -m pytest


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image
        working-directory: services/users-service
        run: |
          docker build -t users-service:ci .
