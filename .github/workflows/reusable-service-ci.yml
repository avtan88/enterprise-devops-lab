name: reusable-service-ci

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      image_name:
        required: true
        type: string

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate service contract
        run: |
          test -f ${{ inputs.service_path }}/Dockerfile
          test -f ${{ inputs.service_path }}/requirements.txt
          test -f ${{ inputs.service_path }}/ci/pipeline.yml
          test -d ${{ inputs.service_path }}/app
          test -d ${{ inputs.service_path }}/tests

  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ inputs.service_path }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        working-directory: ${{ inputs.service_path }}
        run: |
          python -m pytest

  build-scan-publish:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image
        working-directory: ${{ inputs.service_path }}
        run: |
          docker build -t ghcr.io/avtan88/${{ inputs.image_name }}:${GITHUB_SHA} .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/avtan88/${{ inputs.image_name }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Push image
        run: |
          docker push ghcr.io/avtan88/${{ inputs.image_name }}:${GITHUB_SHA}
