name: services-ci

on:
  push:
    paths:
      - "services/**"
      - ".github/workflows/services-ci.yml"
      - ".github/workflows/reusable-service-ci.yml"
      - "platform/ci-templates/v1/**"
  pull_request:
    paths:
      - "services/**"
      - ".github/workflows/services-ci.yml"
      - ".github/workflows/reusable-service-ci.yml"
      - "platform/ci-templates/v1/**"

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  users-service:
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service_name: users-service
      service_path: services/users-service
      image_name: enterprise/users-service

  orders-service:
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service_name: orders-service
      service_path: services/orders-service
      image_name: enterprise/orders-service

  inventory-service:
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service_name: inventory-service
      service_path: services/inventory-service
      image_name: enterprise/inventory-service

  auth-service:
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service_name: auth-service
      service_path: services/auth-service
      image_name: enterprise/auth-service
