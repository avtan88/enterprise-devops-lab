name: services-ci

on:
  push:
    paths:
      - "services/**"
      - ".github/workflows/services-ci.yml"
      - ".github/workflows/reusable-service-ci.yml"
      - "platform/ci-templates/v1/**"
  pull_request:
    paths:
      - "services/**"
      - ".github/workflows/services-ci.yml"
      - ".github/workflows/reusable-service-ci.yml"
      - "platform/ci-templates/v1/**"

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: set-matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git ls-tree -r --name-only "$HEAD_SHA")
          else
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          SERVICES=$(echo "$CHANGED_FILES" | grep '^services/' | cut -d/ -f2 | sort -u)

          if echo "$CHANGED_FILES" | grep -qE '^platform/ci-templates/v1/|^\.github/workflows/reusable-service-ci\.yml|^\.github/workflows/services-ci\.yml$'; then
            SERVICES=$(find services -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)
          fi

          if [ -z "$SERVICES" ]; then
            echo 'matrix={"include":[]}' >> $GITHUB_OUTPUT
            echo 'has_changes=false' >> $GITHUB_OUTPUT
            exit 0
          fi

          MATRIX_JSON='{"include":['
          FIRST=true

          for SERVICE in $SERVICES; do
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              MATRIX_JSON+=","
            fi

            MATRIX_JSON+="{\"service_name\":\"$SERVICE\",\"service_path\":\"services/$SERVICE\",\"image_name\":\"enterprise/$SERVICE\"}"
          done

          MATRIX_JSON+="]}"

          echo "Matrix: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
          echo "has_changes=true" >> $GITHUB_OUTPUT

  services:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service_name: ${{ matrix.service_name }}
      service_path: ${{ matrix.service_path }}
      image_name: ${{ matrix.image_name }}
